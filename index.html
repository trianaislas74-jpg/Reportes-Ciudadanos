<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor de Atención Ciudadana | Mérida</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root {
    --verde-cerrado:#1e5d3b;
    --amarillo-abierto:#f59e0b;
    --fondo:#f8fafc;
    --texto:#0f172a;
    --gris:#64748b;
    --borde:#e2e8f0;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--fondo);color:var(--texto);height:100vh;display:flex;flex-direction:column;}

header{background:white;padding:15px 4%;border-bottom:1px solid var(--borde);display:flex;justify-content:space-between;align-items:center;}

.brand h1{font-family:'Fraunces',serif;font-size:1.2rem;color:var(--verde-cerrado);}
.brand p{font-size:0.7rem;color:var(--gris);text-transform:uppercase;}

.content{display:flex;flex:1;overflow:hidden;}

.sidebar{width:400px;background:white;border-right:1px solid var(--borde);display:flex;flex-direction:column;padding:20px;}

.search-box{background:#f1f5f9;border-radius:12px;padding:12px;display:flex;gap:10px;margin-bottom:20px;}
.search-box input{border:none;background:transparent;outline:none;width:100%;}

.report-list{overflow-y:auto;flex:1;}
.card{border:1px solid var(--borde);border-radius:12px;padding:15px;margin-bottom:12px;cursor:pointer;}
.card:hover{border-color:var(--verde-cerrado);}

.status{font-size:0.65rem;font-weight:800;padding:4px 10px;border-radius:20px;margin-bottom:10px;display:inline-block;}
.status.abierto{background:#fef3c7;color:#92400e;}
.status.cerrado{background:#dcfce7;color:#166534;}

#map{flex:1;}

.loading-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.spin{animation:spin 2s linear infinite;}
@keyframes spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
</style>
</head>

<body>

<div class="loading-overlay" id="loader">
<i data-lucide="refresh-cw" class="spin" size="40"></i>
</div>

<header>
<div class="brand">
<h1>Plataforma de Seguimiento</h1>
<p>Mérida</p>
</div>
</header>

<div class="content">
<aside class="sidebar">
<div class="search-box">
<input type="text" id="filterInput" placeholder="Busca colonia..." onkeyup="filtrar()">
</div>
<div id="lista" class="report-list"></div>
</aside>

<div id="map"></div>
</div>

<script>
lucide.createIcons();

const map = L.map('map').setView([20.967,-89.623],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

function coordsValidas(lat,lng){
return !isNaN(lat) && !isNaN(lng) &&
lat>=20.8 && lat<=21.2 &&
lng>=-89.8 && lng<=-89.5;
}

async function init(){
try{
const res = await fetch("data.json");
const data = await res.json();

const filtrados = data.map(rep=>{
const lat = parseFloat(rep.coords[0]);
const lng = parseFloat(rep.coords[1]);

return coordsValidas(lat,lng)
? {...rep, coords:[lat,lng]}
: null;
}).filter(Boolean);

renderizar(filtrados);

}catch(e){
console.error(e);
alert("Error cargando datos");
}finally{
document.getElementById('loader').style.display="none";
}
}

function renderizar(data){
const lista = document.getElementById('lista');
lista.innerHTML="";

data.forEach(rep=>{
const color = rep.status==="cerrado"?"#1e5d3b":"#f59e0b";

const card = document.createElement('div');
card.className="card";
card.innerHTML=`
<span class="status ${rep.status}">${rep.status}</span>
<h3>${rep.asunto}</h3>
<p>${rep.colonia}</p>
`;

card.onclick=()=>map.flyTo(rep.coords,16);
lista.appendChild(card);

L.circleMarker(rep.coords,{
radius:8,
fillColor:color,
color:"white",
weight:2,
fillOpacity:0.9
}).addTo(map);
});
}

function filtrar(){
const val=document.getElementById('filterInput').value.toLowerCase();
document.querySelectorAll('.card').forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
}

init();
</script>

</body>
</html>
